<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Results summary component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <script src="https://kit.fontawesome.com/f61b06e391.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
  <section id="align">
  <section id="Result" class="box 1">
    <h3>Your Result</h3>
    <h1>76</h1>
    <p>of 100</p>

    <p>Great</p>
    <p>You scored higher than 65% of the people who have taken these tests.</p>

</section>

<section id="summary" class="box 2">

  <h3>Summary</h3>
  <i class="fa-solid fa-bolt" style="color: skyblue;"></i>
  Reaction
  80 / 100 <br>
  <br>

  <i class="fa-solid fa-brain" style="color: skyblue;"></i>
  Memory
  92 / 100 <br>
  <br>
  <i class="fa-regular fa-message" style="color: skyblue;"></i>
  Verbal
  61 / 100 <br>
  <br>
  <i class="fa-solid fa-eye" style="color: skyblue;"></i>
  Visual
  72 / 100 <br> <br>
  <Button>Continue</Button>
</section> <br>
</section>

<footer class="attribution">
  Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
Coded by <a href="#">Your Name Here</a>
</footer>
</body>

  
</body>
</html>
