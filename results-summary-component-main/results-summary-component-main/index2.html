<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <!-- displays site properly based on user's device -->
  <script src="https://kit.fontawesome.com/4df559c6eb.js" crossorigin="anonymous"></script>
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style2.css" />
  <title>Frontend Mentor | Results summary component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <section class="box">
 <section class="result">
 <h3 style="text-align: center; color: white;">Your Result</h3> 
 <section id="boxr">
<h1> 76 </h1> 
<h3> of 100</h3> 
</section>
<br />
<h2 style="text-align: center; color: white;">Great</h2>  
 <p>You scored higher than 65% of</p>
 <p> the people who have taken</p>
 <p> these tests.</p> 
  </section>
  <section class="summary">
<h2>Summary</h2>  
  <br />
  <br />
<section id="info1">
<i class="fa-solid fa-bolt" style="color: rgb(225, 158, 6);"></i>
  Reaction
  80 / 100
  </section>
<br />
<section id="info2">
<i class="fa-solid fa-brain" style="color: rgb(255, 212, 59);"></i>
  Memory
  92 / 100
  </section>
<br />
<section id="info3">
<i class="fa-regular fa-comment" style="color: rgb(99, 230, 190);"></i>
  Verbal
  61 / 100
  </section>
<br />
<section id="info4">
<i class="fa-regular fa-eye" style="color: rgb(87, 43, 216);"></i>
  Visual
  72 / 100
  </section>
<br />
<br />
  <button id="button" href="#">Continue
  </button>
  </section>
  </section>
  <footer class="attribution">

</html>
